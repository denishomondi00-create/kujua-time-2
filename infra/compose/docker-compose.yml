version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: kujua-time-mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-init-replica:
    image: mongo:7
    depends_on:
      - mongodb
    restart: "no"
    entrypoint: >
      bash -lc "
      sleep 5 &&
      mongosh --host mongodb:27017 --eval '
      try {
        rs.status()
      } catch (e) {
        rs.initiate({_id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }]})
      }'
      "

  redis:
    image: redis:7-alpine
    container_name: kujua-time-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    depends_on:
      - mongodb
      - redis
    ports:
      - "4000:4000"

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    env_file:
      - ../../.env
    depends_on:
      - api
    ports:
      - "3000:3000"

  docs:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.docs
    env_file:
      - ../../.env
    ports:
      - "3001:3001"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../.env
    depends_on:
      - api
      - redis
      - mongodb

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.scheduler
    env_file:
      - ../../.env
    depends_on:
      - redis
      - mongodb

volumes:
  mongo_data:
