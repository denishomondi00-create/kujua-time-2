apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: kujua-time
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/kujua-time-api:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: kujua-time-config
            - secretRef:
                name: kujua-time-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kujua-time
spec:
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
