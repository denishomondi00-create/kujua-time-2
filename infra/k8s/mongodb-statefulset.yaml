apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: kujua-time
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          args: ["--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: kujua-time
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
