apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kujua-time
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/example/kujua-time-worker:latest
          envFrom:
            - configMapRef:
                name: kujua-time-config
            - secretRef:
                name: kujua-time-secrets
