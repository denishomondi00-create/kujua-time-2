apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: kujua-time
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/example/kujua-time-scheduler:latest
          envFrom:
            - configMapRef:
                name: kujua-time-config
            - secretRef:
                name: kujua-time-secrets
