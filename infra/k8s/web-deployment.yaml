apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kujua-time
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/kujua-time-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: kujua-time-config
            - secretRef:
                name: kujua-time-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: kujua-time
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
