global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api"
    static_configs:
      - targets: ["api:4000"]

  - job_name: "worker"
    static_configs:
      - targets: ["worker:9464"]

  - job_name: "scheduler"
    static_configs:
      - targets: ["scheduler:9465"]
